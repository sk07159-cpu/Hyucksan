<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>혁산회 통합 포털</title>
    <style>
        :root { --primary: #1a237e; --gold: #ffd700; --blue: #0288d1; --green: #2e7d32; --orange: #ef6c00; --bg: #f5f5f5; --teal: #00897b; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; color: #333; }
        .card { background: white; width: 100%; max-width: 480px; padding: 30px 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box; }
        h1 { color: var(--primary); font-size: 26px; margin: 0 0 15px 0; border-bottom: 3px solid var(--primary); padding-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .status-tag { font-size: 11px; font-weight: bold; margin-bottom: 20px; display: inline-block; padding: 6px 14px; border-radius: 50px; background: #eee; transition: 0.3s; }
        .status-success { background: #e8f5e9; color: #2e7d32; }
        .search-box { margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 16px; border: 2px solid #ddd; border-radius: 15px; font-size: 17px; outline: none; box-sizing: border-box; text-align: center; transition: 0.3s; }
        textarea { height: 120px; text-align: left; resize: none; font-family: inherit; margin-top: 10px; white-space: pre-wrap; }
        
        .group-title { font-size: 14px; font-weight: bold; color: #555; text-align: left; margin: 20px 0 8px 5px; padding-bottom: 5px; border-bottom: 2px dashed #eee; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 10px; }
        button { padding: 16px 5px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 15px; color: white; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:active { transform: scale(0.96); opacity: 0.9; }
        .full-btn { grid-column: 1 / -1; } 

        .bg-navy { background: var(--primary); }
        .bg-blue { background: var(--blue); }
        .bg-green { background: var(--green); }
        .bg-orange { background: var(--orange); }
        .bg-gold { background: #fbc02d; color: #333; }
        .bg-gray { background: #546e7a; }
        .bg-red { background: #d32f2f; }
        .bg-teal { background: var(--teal); }

        #displayArea { width: 100%; max-width: 480px; display: none; margin-bottom: 50px; } /* 여백 추가로 스크롤 용이하게 함 */
        .content-box { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-top: 20px; text-align: left; }
        .biz-text { white-space: pre-wrap; word-break: break-all; line-height: 1.6; color: #555; display: block; margin-top: 5px; }
        .fortune-box { background: #e3f2fd; border: 2px dashed var(--blue); padding: 20px; border-radius: 20px; margin-top: 20px; line-height: 1.7; }
        .highlight { color: #d32f2f; font-weight: bold; }
        .fee-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .fee-row:last-child { border-bottom: none; }
        .fee-title { font-weight: bold; color: #555; }
        .lotto-ball { display: inline-block; width: 34px; height: 34px; line-height: 34px; text-align: center; border-radius: 50%; background: #ffca28; color: #333; font-weight: bold; font-size: 14px; border: 1.5px solid #ffa000; margin-right: 4px; }
        
        .toast { visibility: hidden; min-width: 250px; background-color: rgba(0, 0, 0, 0.85); color: #fff; text-align: center; border-radius: 30px; padding: 16px 20px; position: fixed; z-index: 1000; left: 50%; bottom: 40px; transform: translateX(-50%); font-size: 15px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: opacity 0.4s, bottom 0.4s; opacity: 0; line-height: 1.4; }
        .toast.show { visibility: visible; opacity: 1; bottom: 60px; }

        /* 🐷 시산제 특별 팝업 애니메이션 */
        #splashOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: white; text-align: center; opacity: 1; transition: opacity 1s ease-in-out; }
        .pig-icon { font-size: 80px; animation: bounce 1s infinite alternate; margin-bottom: 20px; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }
        
        /* 🎁 행운상 애니메이션 */
        .lucky-prize { margin-top: 20px; padding: 20px; background: linear-gradient(135deg, #ffd700, #ffb300); border-radius: 15px; color: #333; font-weight: bold; text-align: center; box-shadow: 0 5px 15px rgba(255, 215, 0, 0.5); animation: pulse 1.5s infinite; border: 2px solid #fff; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div id="splashOverlay" style="display: none;">
    <div class="pig-icon">🐷</div>
    <h2 style="margin: 0 20px; line-height: 1.5; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">정발산 시산제에 오신 것을<br>환영합니다!</h2>
    <p style="margin-top: 15px; font-size: 18px; color: #ffd700; font-weight: bold;">안전 산행을 기원합니다 ⛰️</p>
</div>

<div id="toastMsg" class="toast"></div>

<div class="card">
    <h1>🏛️ 혁산회 통합 포털</h1>
    <span id="loadStatus" class="status-tag">⏳ 데이터 연결 중...</span>
    
    <div class="search-box">
        <input type="text" id="nameInput" placeholder="성명을 입력하세요">
    </div>

    <div class="group-title">💰 연회비 및 계좌</div>
    <div class="btn-group">
        <button class="bg-navy" onclick="showFeeInfo()">나의 회비</button>
        <button class="bg-blue" onclick="showList()">정회원 보기</button>
        <button class="bg-teal full-btn" onclick="showAccount()">💳 혁산회 계좌 안내</button>
    </div>

    <div class="group-title">🤝 협찬</div>
    <div class="btn-group">
        <button class="bg-gold" onclick="showDonors('2026')">2026년 누적 협찬</button>
        <button class="bg-orange" id="eventSponBtn" onclick="showDonors('event')">해당행사 협찬</button>
    </div>

    <div class="group-title">🏬 사업장</div>
    <div class="btn-group">
        <button class="bg-green" onclick="showBusiness()">사업장 소개</button>
        <button class="bg-gray" onclick="showBizEdit()">내 사업장 수정</button>
    </div>

    <div class="group-title" id="eventGroupTitle">🏔️ 해당 행사</div>
    <div class="btn-group">
        <button class="bg-red" id="eventPartBtn" onclick="showEventPart()">행사 참여</button>
        <button class="bg-blue" onclick="showFortuneProcess()">🔮 오늘의 사업운</button>
    </div>
</div>

<div id="displayArea">
    <div id="infoContent" class="content-box" style="display:none;"></div>
    <div id="fortuneContent" class="fortune-box" style="display:none;"></div>
    <div id="listContent" class="content-box" style="display:none;"></div>
    <div id="birthSection" class="content-box" style="display:none; border: 2px solid var(--orange);">
        <h3 style="margin-top:0; color:var(--orange);">🎂 생일 등록</h3>
        <input type="number" id="birthInput" placeholder="8자리 (예: 19640520)" style="margin-bottom:10px;">
        <select id="calendarType" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px;">
            <option value="양력">양력</option><option value="음력">음력</option>
        </select>
        <button class="bg-orange" style="width:100%;" id="birthSaveBtn" onclick="saveData('saveBirth')">저장 후 운세보기</button>
    </div>
    <div id="bizEditSection" class="content-box" style="display:none; border: 2px solid #546e7a;">
        <h3 style="margin-top:0; color:#546e7a;">✍️ 내 사업장 정보 수정</h3>
        <p style="font-size:13px; color:#777;">줄바꿈(엔터)을 사용해 내용을 정리해 보세요.</p>
        <textarea id="bizInput" placeholder="홍보 내용을 자유롭게 입력하세요."></textarea>
        <button class="bg-gray" style="width:100%; margin-top:10px;" id="bizSaveBtn" onclick="saveData('saveBusiness')">수정 내용 저장</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLmRiUU_WDJdK6qIklVlHOccGTjTyvCpV1t4JM5A55HBCXyC85mr0EGdydamYDSsA/exec"; 

    let memberData = [];
    let isDataLoaded = false;

    let currentEventName = "시산제";
    let currentEventFeeCol = "시산제 회비";
    let currentEventSponCol = "시산제 협찬";

    const today = new Date();
    // 💡 3월 28일 판별 로직
    const isEventDay = (today.getMonth() + 1 === 3 && today.getDate() === 28);

    window.onload = async () => {
        // 🐷 이벤트 날짜면 스플래시 팝업 표시 후 자동 페이드아웃
        if (isEventDay) {
            const splash = document.getElementById('splashOverlay');
            splash.style.display = 'flex';
            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 1000); // 1초 후 완전히 숨김
            }, 2500); // 2.5초 동안 보여줌
        }

        const statusTag = document.getElementById('loadStatus');
        try { 
            const res = await fetch(SCRIPT_URL); 
            memberData = await res.json(); 
            isDataLoaded = true;
            statusTag.innerText = "✅ 실시간 데이터 연결 성공";
            statusTag.className = "status-tag status-success";

            // 스마트 자동화: 가장 최근(오른쪽) 행사 찾기
            if(memberData.length > 0) {
                const keys = Object.keys(memberData[0]);
                for (let i = keys.length - 1; i >= 0; i--) {
                    if (keys[i].includes('회비') && !keys[i].includes('연회비')) {
                        currentEventFeeCol = keys[i];
                        currentEventName = keys[i].replace('회비', '').trim(); 
                        break;
                    }
                }
                for (let i = keys.length - 1; i >= 0; i--) {
                    if (keys[i].includes(currentEventName) && keys[i].includes('협찬')) {
                        currentEventSponCol = keys[i];
                        break;
                    }
                }
                document.getElementById('eventGroupTitle').innerText = `🏔️ ${currentEventName}`;
                document.getElementById('eventPartBtn').innerText = `${currentEventName} 참여`;
                document.getElementById('eventSponBtn').innerText = `${currentEventName} 협찬`;
            }
        } catch(e) { statusTag.innerText = "❌ 연결 실패 (새로고침 하세요)"; }
    };

    function showToast(msg) {
        const toast = document.getElementById("toastMsg");
        toast.innerText = msg;
        toast.className = "toast show";
        setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
    }

    function copyAccount() {
        const accountNumber = "79420757606";
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(accountNumber).then(() => {
                showToast("💳 계좌번호가 복사되었습니다!\n은행 앱에 붙여넣기 해주세요. 🌷");
            }).catch(() => fallbackCopy(accountNumber));
        } else {
            fallbackCopy(accountNumber);
        }
    }

    function fallbackCopy(text) {
        let textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.left = "-999999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
            showToast("💳 계좌번호가 복사되었습니다!\n은행 앱에 붙여넣기 해주세요. 🌷");
        } catch (err) {
            showToast("자동 복사를 지원하지 않는 기기입니다.\n계좌번호를 직접 길게 눌러 복사해 주세요.");
        }
        document.body.removeChild(textArea);
    }

    function findUser() {
        if(!isDataLoaded) { showToast("데이터 로딩 중입니다. 잠시만 기다려주세요."); return null; }
        const name = document.getElementById('nameInput').value.trim();
        if(!name) { showToast("정보를 확인하기 위해\n이름을 입력하시기 바랍니다. 🌷"); return null; }
        const user = memberData.find(u => u.성명 === name);
        if(!user) { showToast("명단에 없는 이름입니다.\n다시 한번 확인해 주세요."); return null; }
        return user;
    }

    // 💡 화면 초기화 및 버튼 클릭 시 자동으로 내용으로 스크롤 내려주기 기능 추가
    function resetDisplay() {
        document.getElementById('displayArea').style.display = "block";
        document.getElementById('infoContent').style.display = "none";
        document.getElementById('fortuneContent').style.display = "none";
        document.getElementById('listContent').style.display = "none";
        document.getElementById('birthSection').style.display = "none";
        document.getElementById('bizEditSection').style.display = "none";
    }

    function scrollToContent() {
        setTimeout(() => {
            document.getElementById('displayArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100); // 렌더링 후 스르륵 내려가도록 약간의 지연시간 부여
    }

    function showAccount() {
        resetDisplay(); 
        const list = document.getElementById('listContent'); 
        list.style.display = "block";
        
        list.innerHTML = `
            <h3>💳 혁산회 회비 계좌 안내</h3>
            <div style="margin-top:20px; padding:30px 20px; background:#f8f9fa; border-radius:20px; border:2px dashed var(--teal); text-align:center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                <p style="font-size:15px; font-weight:bold; color:#555; margin:0 0 10px 0;">혁산회 공식 계좌</p>
                <p style="font-size:24px; color:var(--teal); font-weight:900; margin:0; letter-spacing: 1px;">7942-07-57606</p>
                <p style="font-size:17px; color:#333; font-weight:bold; margin:8px 0 10px 0;">카카오뱅크</p>
                <div style="display:inline-block; padding:5px 15px; background:#eee; border-radius:10px; font-size:14px; color:#555; margin-bottom: 20px;">
                    예금주 : 한수경 (혁신산우회)
                </div>
                <button onclick="copyAccount()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:12px; font-size:16px; font-weight:bold; cursor:pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition:0.2s;">📋 계좌번호 복사하기</button>
            </div>
        `;
        scrollToContent();
    }

    function showFeeInfo() {
        const user = findUser(); if(!user) return;
        resetDisplay();
        const info = document.getElementById('infoContent');
        info.style.display = "block";
        
        const feeAnnual = Number(user['금액']) > 0 ? Number(user['금액']).toLocaleString() + '원 납부' : '미납/정보없음';
        
        const eFeeRaw = Number(user[currentEventFeeCol]);
        let feeEventHtml = '미신청/미납';
        if (eFeeRaw === 10) {
            feeEventHtml = `<span style="color:#f57c00; font-weight:bold;">${currentEventName} 회비 입금 확인 중 🔍</span>`;
        } else if (eFeeRaw >= 10000) {
            feeEventHtml = `<span class="highlight">${eFeeRaw.toLocaleString()}원 납부</span>`;
        }

        const sponsor2026 = user['2026년 협찬 누적'] ? Number(user['2026년 협찬 누적']).toLocaleString() + '원' : '0원';
        const sponsorEventRaw = Number(user[currentEventSponCol]);
        const sponsorEventText = sponsorEventRaw > 0 ? sponsorEventRaw.toLocaleString() + '원' : '0원';

        info.innerHTML = `
            <h3>💰 ${user.성명} 회원님 회비/협찬 내역</h3>
            <div class="fee-row">
                <span class="fee-title">연회비 (금액)</span>
                <span class="${feeAnnual.includes('납부') ? 'highlight' : ''}">${feeAnnual}</span>
            </div>
            <div class="fee-row">
                <span class="fee-title">${currentEventName} 회비</span>
                <span>${feeEventHtml}</span>
            </div>
            <div class="fee-row">
                <span class="fee-title">2026년 누적 협찬</span>
                <span style="color:var(--green); font-weight:bold;">${sponsor2026}</span>
            </div>
            <div class="fee-row">
                <span class="fee-title">${currentEventName} 협찬</span>
                <span style="color:var(--orange); font-weight:bold;">${sponsorEventText}</span>
            </div>
        `;
        scrollToContent();
    }

    function showList() {
        if(!isDataLoaded) return;
        resetDisplay(); const list = document.getElementById('listContent'); list.style.display = "block";
        
        const regularMembers = memberData.filter(u => Number(u['금액']) > 0);
        let html = `<h3>👥 정회원 명단 (${regularMembers.length}명)</h3><p style="font-size:12px; color:#777;">(연회비를 납부하신 회원님들입니다)</p><div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:15px;">`;
        regularMembers.sort((a,b)=>a.성명.localeCompare(b.성명,'ko')).forEach(u=> html += `<div>${u.성명} 회원님</div>`);
        html += `</div>`;
        list.innerHTML = html;
        scrollToContent();
    }

    function showDonors(type) {
        if(!isDataLoaded) return;
        resetDisplay(); const list = document.getElementById('listContent'); list.style.display = "block";
        
        let targetColumn = type === '2026' ? '2026년 협찬 누적' : currentEventSponCol;
        let title = type === '2026' ? '2026년 누적 협찬' : `${currentEventName} 협찬`;
        
        let html = `<h3 style="margin-bottom:10px;">🤝 ${title}하신 분</h3><p style="font-size:14px; color:var(--green); font-weight:bold; margin-bottom:15px;">"당신의 협찬으로 혁산회가 발전합니다. 감사합니다."</p>`;
        
        memberData.filter(u => Number(u[targetColumn]) > 0).forEach(u => {
            html += `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;">
                        <span>${u.성명} 회원님</span>
                        <b>${Number(u[targetColumn]).toLocaleString()}원</b>
                     </div>`;
        });
        list.innerHTML = html;
        scrollToContent();
    }

    function showEventPart() {
        if(!isDataLoaded) return;
        resetDisplay(); const list = document.getElementById('listContent'); list.style.display = "block";
        
        const paidMembers = memberData.filter(u => Number(u[currentEventFeeCol]) >= 10000);
        const unpaidMembers = memberData.filter(u => Number(u[currentEventFeeCol]) === 10);

        paidMembers.sort((a,b)=>a.성명.localeCompare(b.성명,'ko'));
        unpaidMembers.sort((a,b)=>a.성명.localeCompare(b.성명,'ko'));

        let html = `<h3>🏔️ ${currentEventName} 참여 신청 현황</h3>`;
        
        html += `<h4 style="color: var(--primary); margin-bottom: 10px; margin-top: 20px; border-bottom: 2px solid #eee; padding-bottom: 5px;">✅ 회비 납부 확인되신 분 (${paidMembers.length}명)</h4>`;
        html += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom: 25px;">`;
        paidMembers.forEach(u=> html += `<div>${u.성명} 회원님</div>`);
        html += `</div>`;

        html += `<h4 style="color: var(--orange); margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 5px;">🔍 회비 납부 확인 중인 분 (${unpaidMembers.length}명)</h4>`;
        html += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom: 15px;">`;
        unpaidMembers.forEach(u=> html += `<div style="color: #777;">${u.성명} 회원님</div>`);
        html += `</div>`;

        html += `
            <div style="margin-top:35px; padding:25px 20px; background:#f8f9fa; border-radius:20px; border:2px dashed var(--teal); text-align:center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                <p style="font-size:15px; font-weight:bold; color:#555; margin:0 0 10px 0;">💳 ${currentEventName} 회비 납부 계좌</p>
                <p style="font-size:24px; color:var(--teal); font-weight:900; margin:0; letter-spacing: 1px;">7942-07-57606</p>
                <p style="font-size:17px; color:#333; font-weight:bold; margin:8px 0 10px 0;">카카오뱅크</p>
                <div style="display:inline-block; padding:5px 15px; background:#eee; border-radius:10px; font-size:14px; color:#555; margin-bottom: 20px;">
                    예금주 : 한수경 (혁신산우회)
                </div>
                <button onclick="copyAccount()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:12px; font-size:16px; font-weight:bold; cursor:pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition:0.2s;">📋 계좌번호 복사하기</button>
            </div>
        `;

        list.innerHTML = html;
        scrollToContent();
    }

    function showBizEdit() {
        const user = findUser(); if(!user) return;
        resetDisplay();
        document.getElementById('bizEditSection').style.display = "block";
        document.getElementById('bizInput').value = user['사업장소개'] || '';
        window.currentUser = user; 
        scrollToContent();
    }

    function showBusiness() {
        if(!isDataLoaded) return;
        resetDisplay(); const list = document.getElementById('listContent'); list.style.display = "block";
        let html = `<h3>🏬 사업장 소개</h3>`;
        memberData.filter(u=>u['사업장소개'] && u['사업장소개'].trim() !== '').forEach(u=> {
            html += `<div style="margin-bottom:20px; padding-bottom:10px; border-bottom:2px solid #f0f0f0;"><b style="color:var(--primary); font-size:17px;">${u.성명}</b><span class="biz-text">${u['사업장소개']}</span></div>`;
        });
        list.innerHTML = html;
        scrollToContent();
    }

    async function saveData(action) {
        if(!window.currentUser) return;
        let payload = { name: window.currentUser.성명, action: action };
        const btn = action === 'saveBirth' ? document.getElementById('birthSaveBtn') : document.getElementById('bizSaveBtn');
        
        if(action === 'saveBirth') {
            payload.birth = document.getElementById('birthInput').value;
            payload.type = document.getElementById('calendarType').value;
            if(payload.birth.length !== 8) { showToast("생년월일 8자리를 입력하세요."); return; }
        } else { 
            payload.business = document.getElementById('bizInput').value; 
        }
        
        btn.innerText = "저장 중..."; btn.disabled = true;
        try {
            await fetch(SCRIPT_URL, { 
                method: 'POST', redirect: 'follow',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload) 
            });
            showToast("정보가 성공적으로 저장되었습니다. 🌟");
            setTimeout(() => location.reload(), 1500); 
        } catch(e) { 
            showToast("통신 오류가 발생했습니다. 다시 시도해 주세요."); 
        } finally { 
            btn.innerText = "저장 완료"; btn.disabled = false; 
        }
    }

    function showFortuneProcess() {
        const user = findUser(); if(!user) return;
        resetDisplay();
        window.currentUser = user;
        if(!user['생년월일']) {
            document.getElementById('birthSection').style.display = "block";
            scrollToContent();
        } else {
            showFortune();
        }
    }

    function getEnhancedSeed(name) {
        let seed = 0;
        for (let i = 0; i < name.length; i++) { seed += name.charCodeAt(i) * (i + 1); }
        return seed;
    }

    function showFortune() {
        const user = window.currentUser;
        resetDisplay();
        const fBox = document.getElementById('fortuneContent'); fBox.style.display = "block";
        const dateStr = `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일`;
        const dateSeed = today.getFullYear()*10000 + (today.getMonth()+1)*100 + today.getDate();
        const nameSeed = getEnhancedSeed(user.성명);
        const finalSeed = dateSeed + nameSeed + 62; 
        
        const lucks = [
            "뜻밖의 반가운 소식이 들려와 사업에 활기가 띱니다. 😊", "재물운이 활짝 열리는 날! 큰 거래가 성사될 수 있습니다. 💰",
            "자신감을 가지고 전진하세요. 당신의 사업 능력이 빛을 발합니다. ✨", "고객들에게 칭찬받고 입소문이 나는 즐거운 하루가 됩니다. 👍",
            "막혔던 자금이나 고민이 시원하게 풀리는 마법 같은 날입니다. 🌊", "오늘은 서두르지 말고 여유를 가질 때 귀한 인연이 찾아옵니다. 🐢",
            "귀인의 도움으로 어려운 난관을 쉽게 극복할 사업운입니다. 🤝", "오늘은 당신의 사업장이 지역의 주인공이 되는 기운입니다. 👑"
        ];
        
        let mainLuck = lucks[finalSeed % lucks.length];
        let prizeHtml = "";

        // 💡 3월 28일 시산제 특별 운세 로직
        if (isEventDay) {
            mainLuck = `⛰️ 고양시 정발산 산신령이 강림하셨습니다!<br><b style="color:var(--primary);">${user.성명} 회원님</b>의 올 한 해 무사 산행과 사업 대박을 점지해 주셨습니다! 🎉`;
            prizeHtml = `
                <div class="lucky-prize">
                    🎁 축하합니다!<br>
                    ${user.성명}님은 <span style="color:#d32f2f;">특별 행운상</span>에 당첨되었습니다.<br>
                    행운상품은 <b>아이스 아메리카노 ☕</b> 한 잔입니다!
                </div>
            `;
        } else if (today.getDay() === 5) { 
            mainLuck = "고양시 혁산회에 아주 기쁜 소식이 날아든다. 회원 모두 이 기쁜 소식에 어울려 덩실덩실 춤을 추면 자손대대 복이 내린다 🎊";
        }

        const ilsanSpots = ["정발산", "호수공원", "행주산성", "대화역", "주엽역", "일산역", "애니골", "밤리단길", "웨스턴돔"];
        const spotBlessings = [" 쪽으로 가면 대박 기운이 들어옵니다! 📈", " 인근에서 귀인을 만날 확률이 높습니다. ✨", " 근처에서 금전운이 쏟아집니다! 💵"];
        const rests = ["고봉산 시레기", "장항동 어랑 생선구이", "마두동 어선생", "애니골 가나안덕", "일산시장 순대국"];
        const colors = ["청록색", "황금색", "순백색", "하늘색", "보라색", "진갈색"];
        
        const spot = ilsanSpots[(finalSeed + 17) % ilsanSpots.length];
        const blessing = spotBlessings[(finalSeed + 13) % spotBlessings.length];
        const rest = rests[(finalSeed + 23) % rests.length];
        const color = colors[(finalSeed + 11) % colors.length];
        const energy = ((finalSeed * 13) % 11) + 90;

        let partner = "없음";
        if (memberData.length > 1) {
            let pIndex = (finalSeed + 77) % memberData.length;
            if (memberData[pIndex].성명 === user.성명) pIndex = (pIndex + 1) % memberData.length;
            partner = memberData[pIndex].성명;
        }

        const lotto = [];
        let lSeed = finalSeed;
        while(lotto.length < 7) { 
            let n = Math.floor((Math.abs(Math.sin(lSeed++) * 10000) % 45)) + 1;
            if(!lotto.includes(n)) lotto.push(n);
        }
        lotto.sort((a,b)=>a-b);

        fBox.innerHTML = `
            <div style="text-align:right; font-size:12px; color:#999;">📅 ${dateStr}</div>
            <h3>🔮 ${user.성명}님 오늘의 사업운</h3>
            <p style="font-size:16px; line-height:1.5; color:#d32f2f;"><b>"${mainLuck}"</b></p>
            <p style="font-size:15px; color:var(--primary); font-weight:bold; background:#fff; padding:10px; border-radius:10px; border:1px solid #cce3f6;">
                📍 일산 지역 복채: <br>"${spot}${blessing}"
            </p>
            <hr style="border:0; border-top:1px dashed #ccc; margin:15px 0;">
            <p>⚡ 사업장 에너지: <span class="highlight">${energy}%</span></p>
            <p>🎨 행운 색상: <b>${color}</b></p>
            <p>🍽️ 추천맛집: <b>${rest}</b></p>
            <p>🤝 오늘의 찰떡궁합 짝꿍: <b style="color:var(--orange); font-size:16px;">${partner} 회원님</b></p>
            
            <div style="margin:20px 0; padding:15px; background:#fff; border-radius:15px; border:1px solid #eee; text-align:center;">
                <p style="font-size:14px; margin-bottom:10px; font-weight:bold; color:#666;">🍀 행운 숫자 (로또):</p>
                <div class="lotto-container">${lotto.map(n => `<span class="lotto-ball">${n}</span>`).join('')}</div>
                <p style="font-size:12px; color:#d32f2f; margin-top:10px; font-weight:bold;">" 당첨 시 당첨금의 10%를 혁산회 기금으로 기부해야 합니다 "</p>
            </div>
            
            ${prizeHtml}

            <p style="font-size:11px; color:#777; text-align:center; font-style:italic; margin-top:20px;">" ${user.성명}님의 성명 사주를 기반으로 분석한 결과입니다. "</p>
        `;
        scrollToContent();
    }
</script>
