<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>혁산회 통합 포털</title>
    <style>
        :root { --primary: #1a237e; --gold: #ffd700; --blue: #0288d1; --green: #2e7d32; --orange: #ef6c00; --bg: #f5f5f5; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; color: #333; }
        .card { background: white; width: 100%; max-width: 480px; padding: 30px 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; box-sizing: border-box; }
        h1 { color: var(--primary); font-size: 26px; margin: 0 0 15px 0; border-bottom: 3px solid var(--primary); padding-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* 💳 상단 계좌번호 박스 스타일 */
        .account-box { background: #f8f9fa; border: 2px solid #e0e0e0; border-radius: 15px; padding: 15px; margin-bottom: 20px; text-align: center; width: 100%; box-sizing: border-box; }
        .account-title { font-size: 13px; color: #777; font-weight: bold; margin-bottom: 5px; }
        .account-number { font-size: 18px; color: var(--primary); font-weight: 800; letter-spacing: 0.5px; margin-bottom: 3px; }
        .account-name { font-size: 13px; color: #555; }

        .status-tag { font-size: 11px; font-weight: bold; margin-bottom: 20px; display: inline-block; padding: 6px 14px; border-radius: 50px; background: #eee; transition: 0.3s; }
        .status-success { background: #e8f5e9; color: #2e7d32; }
        .search-box { margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 16px; border: 2px solid #ddd; border-radius: 15px; font-size: 17px; outline: none; box-sizing: border-box; text-align: center; transition: 0.3s; }
        textarea { height: 120px; text-align: left; resize: none; font-family: inherit; margin-top: 10px; white-space: pre-wrap; }
        
        /* 그룹 타이틀 스타일 */
        .group-title { font-size: 14px; font-weight: bold; color: #555; text-align: left; margin: 20px 0 8px 5px; padding-bottom: 5px; border-bottom: 2px dashed #eee; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-bottom: 10px; }
        button { padding: 16px 5px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 15px; color: white; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:active { transform: scale(0.96); opacity: 0.9; }
        .full-btn { grid-column: 1 / -1; } 

        .bg-navy { background: var(--primary); }
        .bg-blue { background: var(--blue); }
        .bg-green { background: var(--green); }
        .bg-orange { background: var(--orange); }
        .bg-gold { background: #fbc02d; color: #333; }
        .bg-gray { background: #546e7a; }
        .bg-red { background: #d32f2f; }

        #displayArea { width: 100%; max-width: 480px; display: none; }
        .content-box { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-top: 20px; text-align: left; }
        .biz-text { white-space: pre-wrap; word-break: break-all; line-height: 1.6; color: #555; display: block; margin-top: 5px; }
        .fortune-box { background: #e3f2fd; border: 2px dashed var(--blue); padding: 20px; border-radius: 20px; margin-top: 20px; line-height: 1.7; }
        .highlight { color: #d32f2f; font-weight: bold; }
        .fee-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .fee-row:last-child { border-bottom: none; }
        .fee-title { font-weight: bold; color: #555; }
        .lotto-ball { display: inline-block; width: 34px; height: 34px; line-height: 34px; text-align: center; border-radius: 50%; background: #ffca28; color: #333; font-weight: bold; font-size: 14px; border: 1.5px solid #ffa000; margin-right: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🏛️ 혁산회 통합 포털</h1>
    
    <div class="account-box">
        <div class="account-title">💳 혁산회 회비 계좌</div>
        <div class="account-number">7942-07-57606 카카오뱅크</div>
        <div class="account-name">(예금주: 한수경.혁신산우회)</div>
    </div>

    <span id="loadStatus" class="status-tag">⏳ 데이터 연결 중...</span>
    
    <div class="search-box">
        <input type="text" id="nameInput" placeholder="성명을 입력하세요">
    </div>

    <div class="group-title">💰 연회비</div>
    <div class="btn-group">
        <button class="bg-navy" onclick="showFeeInfo()">나의 회비</button>
        <button class="bg-blue" onclick="showList()">정회원 보기</button>
    </div>

    <div class="group-title">🤝 협찬</div>
    <div class="btn-group">
        <button class="bg-gold" onclick="showDonors('2026')">2026년 누적 협찬</button>
        <button class="bg-orange" onclick="showDonors('sisanje')">시산제 협찬</button>
    </div>

    <div class="group-title">🏬 사업장</div>
    <div class="btn-group">
        <button class="bg-green" onclick="showBusiness()">사업장 소개</button>
        <button class="bg-gray" onclick="showBizEdit()">내 사업장 수정</button>
        <button class="bg-blue full-btn" onclick="showFortuneProcess()">🔮 오늘의 사업운</button>
    </div>

    <div class="group-title">🏔️ 시산제</div>
    <div class="btn-group">
        <button class="bg-red" onclick="showSisanjePart()">시산제 참여</button>
        <button class="bg-navy" onclick="showSisanjePay()">회비 납부</button>
    </div>
</div>

<div id="displayArea">
    <div id="infoContent" class="content-box" style="display:none;"></div>
    <div id="fortuneContent" class="fortune-box" style="display:none;"></div>
    <div id="listContent" class="content-box" style="display:none;"></div>
    <div id="birthSection" class="content-box" style="display:none; border: 2px solid var(--orange);">
        <h3 style="margin-top:0; color:var(--orange);">🎂 생일 등록</h3>
        <input type="number" id="birthInput" placeholder="8자리 (예: 19640520)" style="margin-bottom:10px;">
        <select id="calendarType" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px;">
            <option value="양력">양력</option><option value="음력">음력</option>
        </select>
        <button class="bg-orange" style="width:100%;" id="birthSaveBtn" onclick="saveData('saveBirth')">저장 후 운세보기</button>
    </div>
    <div id="bizEditSection" class="content-box" style="display:none; border: 2px solid #546e7a;">
        <h3 style="margin-top:0; color:#546e7a;">✍️ 내 사업장 정보 수정</h3>
        <p style="font-size:13px; color:#777;">줄바꿈(엔터)을 사용해 내용을 정리해 보세요.</p>
        <textarea id="bizInput" placeholder="홍보 내용을 자유롭게 입력하세요."></textarea>
        <button class="bg-gray" style="width:100%; margin-top:10px;" id="bizSaveBtn" onclick="saveData('saveBusiness')">수정 내용 저장</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYi0x-rLxpEufe2cqwSGVRub6vCcItpVJHrFR8jYkDvOs7fxnuhndVSA4G_fSeDJjJ/exec"; 

    let memberData = [];
    let isDataLoaded = false;

    window.onload = async () => {
        const statusTag = document.getElementById('loadStatus');
        try { 
            const res = await fetch(SCRIPT_URL); 
            memberData = await res.json(); 
            isDataLoaded = true;
            statusTag.innerText = "✅ 실시간 데이터 연결 성공";
            statusTag.className = "status-tag status-success";
        } catch(e) { statusTag.innerText = "❌ 연결 실패 (새로고침 하세요)"; }
    };

    function findUser() {
        if(!isDataLoaded) { alert("데이터 로딩 중입니다."); return null; }
        const name = document.getElementById('nameInput').value.trim();
        if(!name) { alert("성명을 입력하세요."); return null; }
        const user = memberData.find(u => u.성명 === name);
        if(!user) alert("명단에 없습니다.");
        return user;
    }

    function resetDisplay() {
        document.getElementById('displayArea').style.display = "block";
        document.getElementById('infoContent').style.display = "none";
        document.getElementById('fortuneContent').style.display = "none";
        document.getElementById('listContent').style.display = "none";
        document.getElementById('birthSection').style.display = "none";
        document.getElementById('bizEditSection').style.display = "none";
    }

    function showFeeInfo() {
        const user = findUser(); if(!user) return;
        resetDisplay();
        const info = document.getElementById('infoContent');
        info.style.display = "block";
        
        const feeAnnual = Number(user['금액']) > 0 ? Number(user['금액']).toLocaleString() + '원 납부' : '미납/정보없음';
        const sFee = Number(user['시산제 회비']);
        const feeSisanje = (sFee > 0) ? sFee.toLocaleString() + '원 납부' : '미납/정보없음';
        const sponsor2026 = user['2026년 협찬 누적'] ? Number(user['2026년 협찬 누적']).toLocaleString() + '원' : '0원';
        const sponsorSisanje = user['시산제 협찬'] ? Number(user['시산제 협찬']).toLocaleString() + '원' : '0원';

        info.innerHTML = `
            <h3>💰 ${user.성명} 회원님 회비/협찬 내역</h3>
            <div class="fee-row">
                <span class="fee-title">연회비 (금액)</span>
                <span class="${feeAnnual.includes('납부') ? 'highlight' : ''}">${feeAnnual}</span>
            </div>
            <div class="fee-row">
                <span class="fee-title">시산제 회비</span>
                <span class="${feeSisanje.includes('납부') ? 'highlight' : ''}">${feeSisanje}</span>
            </div>
            <div class="fee-row">
                <span class="fee-title">2026년 누적 협찬</span>
                <span style="color:var(--green); font-weight:bold;">${sponsor2026}</span>
            </div>
            <div class="fee-row">
                <span class="fee-title">시산제 협찬</span>
                <span style="color:var(--orange); font-weight:bold;">${sponsorSisanje}</span>
            </div>
        `;
    }

    function showList() {
        if(!isDataLoaded) return;
        resetDisplay(); const list = document.getElementById('listContent'); list.style.display = "block";
        let html = `<h3>👥 정회원 명단</h3><p style="font-size:12px; color:#777;">(연회비를 납부하신 회원님들입니다)</p><div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:15px;">`;
        
        const regularMembers = memberData.filter(u => Number(u['금액']) > 0);
        regularMembers.sort((a,b)=>a.성명.localeCompare(b.성명,'ko')).forEach(u=> html += `<div>${u.성명} 회원님</div>`);
        html += `</div>`;
        list.innerHTML = html;
    }

    function showDonors(type) {
        if(!isDataLoaded) return;
        resetDisplay(); const list = document.getElementById('listContent'); list.style.display = "block";
        
        let title = type === '2026' ? '2026년 누적 협찬' : '시산제 협찬';
        let html = `<h3 style="margin-bottom:10px;">🤝 ${title}하신 분</h3><p style="font-size:14px; color:var(--green); font-weight:bold; margin-bottom:15px;">"당신의 협찬으로 혁산회가 발전합니다. 감사합니다."</p>`;
        
        let targetColumn = type === '2026' ? '2026년 협찬 누적' : '시산제 협찬';
        
        memberData.filter(u => Number(u[targetColumn]) > 0).forEach(u => {
            html += `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;">
                        <span>${u.성명} 회원님</span>
                        <b>${Number(u[targetColumn]).toLocaleString()}원</b>
                     </div>`;
        });
        list.innerHTML = html;
    }

    /* 🏔️ 시산제 참여 명단 (0원 이상) */
    function showSisanjePart() {
        if(!isDataLoaded) return;
        resetDisplay(); const list = document.getElementById('listContent'); list.style.display = "block";
        let html = `<h3>🏔️ 시산제 참여 명단</h3><p style="font-size:12px; color:#777;">(참여가 확인된 회원님들입니다)</p><div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:15px;">`;
        
        const partMembers = memberData.filter(u => Number(u['시산제 회비']) > 0);
        partMembers.sort((a,b)=>a.성명.localeCompare(b.성명,'ko')).forEach(u=> html += `<div>${u.성명} 회원님</div>`);
        html += `</div>`;
        list.innerHTML = html;
    }

    /* 💳 시산제 회비 납부 명단 (납부/미납 분리) */
    function showSisanjePay() {
        if(!isDataLoaded) return;
        resetDisplay(); const list = document.getElementById('listContent'); list.style.display = "block";
        
        const paidMembers = memberData.filter(u => Number(u['시산제 회비']) > 0);
        const unpaidMembers = memberData.filter(u => {
            const fee = Number(u['시산제 회비']);
            return isNaN(fee) || fee <= 0 || u['시산제 회비'] === '';
        });

        paidMembers.sort((a,b)=>a.성명.localeCompare(b.성명,'ko'));
        unpaidMembers.sort((a,b)=>a.성명.localeCompare(b.성명,'ko'));

        let html = `<h3>💳 시산제 회비 납부 현황</h3>`;
        
        html += `<h4 style="color: var(--primary); margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 5px;">✅ 납부 완료 (${paidMembers.length}명)</h4>`;
        html += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom: 25px;">`;
        paidMembers.forEach(u=> html += `<div>${u.성명} 회원님</div>`);
        html += `</div>`;

        html += `<h4 style="color: #d32f2f; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 5px;">⏳ 미납부 (${unpaidMembers.length}명)</h4>`;
        html += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom: 15px;">`;
        unpaidMembers.forEach(u=> html += `<div style="color: #777;">${u.성명} 회원님</div>`);
        html += `</div>`;

        // 화면 맨 아래에 계좌번호 다시 안내
        html += `
            <div style="margin-top:30px; padding:20px; background:#f8f9fa; border-radius:15px; border:2px dashed var(--primary); text-align:center;">
                <p style="font-size:14px; font-weight:bold; color:#555; margin:0 0 8px 0;">💳 시산제 회비 납부 계좌</p>
                <p style="font-size:18px; color:var(--primary); font-weight:800; margin:0;">7942-07-57606 카카오뱅크</p>
                <p style="font-size:13px; color:#666; margin:5px 0 0 0;">(한수경.혁신산우회)</p>
            </div>
        `;
        
        list.innerHTML = html;
    }

    function showBizEdit() {
        const user = findUser(); if(!user) return;
        resetDisplay();
        document.getElementById('bizEditSection').style.display = "block";
        document.getElementById('bizInput').value = user['사업장소개'] || '';
        window.currentUser = user; 
    }

    function showBusiness() {
        if(!isDataLoaded) return;
        resetDisplay(); const list = document.getElementById('listContent'); list.style.display = "block";
        let html = `<h3>🏬 사업장 소개</h3>`;
        memberData.filter(u=>u['사업장소개'] && u['사업장소개'].trim() !== '').forEach(u=> {
            html += `<div style="margin-bottom:20px; padding-bottom:10px; border-bottom:2px solid #f0f0f0;"><b style="color:var(--primary); font-size:17px;">${u.성명}</b><span class="biz-text">${u['사업장소개']}</span></div>`;
        });
        list.innerHTML = html;
    }

    async function saveData(action) {
        if(!window.currentUser) return;
        let payload = { name: window.currentUser.성명, action: action };
        const btn = action === 'saveBirth' ? document.getElementById('birthSaveBtn') : document.getElementById('bizSaveBtn');
        if(action === 'saveBirth') {
            payload.birth = document.getElementById('birthInput').value;
            payload.type = document.getElementById('calendarType').value;
            if(payload.birth.length !== 8) return alert("8자리를 입력하세요.");
        } else { payload.business = document.getElementById('bizInput').value; }
        btn.innerText = "저장 중..."; btn.disabled = true;
        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("정보가 저장되었습니다.");
            location.reload(); 
        } catch(e) { alert("통신 오류가 발생했습니다."); } 
        finally { btn.innerText = "저장 완료"; btn.disabled = false; }
    }

    function showFortuneProcess() {
        const user = findUser(); if(!user) return;
        resetDisplay();
        window.currentUser = user;
        if(!user['생년월일']) document.getElementById('birthSection').style.display = "block";
        else showFortune();
    }

    function getEnhancedSeed(name) {
        let seed = 0;
        for (let i = 0; i < name.length; i++) { seed += name.charCodeAt(i) * (i + 1); }
        return seed;
    }

    function showFortune() {
        const user = window.currentUser;
        resetDisplay();
        const fBox = document.getElementById('fortuneContent'); fBox.style.display = "block";
        const today = new Date();
        const dateStr = `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일`;
        const dateSeed = today.getFullYear()*10000 + (today.getMonth()+1)*100 + today.getDate();
        const nameSeed = getEnhancedSeed(user.성명);
        const finalSeed = dateSeed + nameSeed + 62; 
        
        const lucks = [
            "뜻밖의 반가운 소식이 들려와 사업에 활기가 띱니다. 😊", "재물운이 활짝 열리는 날! 큰 거래가 성사될 수 있습니다. 💰",
            "자신감을 가지고 전진하세요. 당신의 사업 능력이 빛을 발합니다. ✨", "고객들에게 칭찬받고 입소문이 나는 즐거운 하루가 됩니다. 👍",
            "막혔던 자금이나 고민이 시원하게 풀리는 마법 같은 날입니다. 🌊", "오늘은 서두르지 말고 여유를 가질 때 귀한 인연이 찾아옵니다. 🐢",
            "귀인의 도움으로 어려운 난관을 쉽게 극복할 사업운입니다. 🤝", "오늘은 당신의 사업장이 지역의 주인공이 되는 기운입니다. 👑",
            "창의적인 마케팅 아이디어가 솟아나는 날입니다. 기록해 두세요! 📝", "깜짝 계약이나 이득이 생기는 기분 좋은 하루입니다. 🎁"
        ];
        
        let mainLuck = lucks[finalSeed % lucks.length];
        if (today.getDay() === 5) { 
            mainLuck = "고양시 혁산회에 아주 기쁜 소식이 날아든다. 회원 모두 이 기쁜 소식에 어울려 덩실덩실 춤을 추면 자손대대 복이 내린다 🎊";
        }

        const ilsanSpots = [
            "정발산", "호수공원", "행주산성", "대화역", "주엽역", "일산역", "백마역", "애니골", "화정역", "고봉산", 
            "주엽동", "일산시장", "문화광장", "원마운트", "일산 가로수길", "밤리단길", "저동초등학교", "푸른샘음악학원", 
            "고양운동장", "대진고등학교", "백석고등학교", "후곡마을", "정발마을", "문촌마을", "강선마을", "강촌마을", 
            "웨스턴돔", "라페스타", "벨라시타"
        ];
        const spotBlessings = [
            "쪽으로 가면 대박 기운이 들어옵니다! 📈", "인근에서 귀인을 만날 확률이 매우 높습니다. ✨",
            "근처에서 평생의 귀한 연을 만납니다. 💖", "방향으로 산책하면 금전운이 쏟아져 들어옵니다! 💵",
            "에서 즐거운 만찬을 하면 모든 액운이 씻겨나갑니다. 🍀", "쪽에서 뜻밖의 횡재수를 만날 수 있습니다! 💎"
        ];
        const rests = [
            "고봉산 시레기", "장항동 어랑 생선구이", "마두동 어선생", "애니골 가나안덕", "일산시장 순대국", 
            "웨돔 돈까스", "라페스타 초밥", "벨라시타 파스타", "풍동 애니골 오리구이", "백석동 곰탕",
            "정발산동 밤리단길 카페", "대화동 평양냉면", "주엽동 털보네 생선구이", "식사동 중식당", "탄현동 고기집"
        ];
        const colors = ["청록색", "황금색", "순백색", "하늘색", "보라색", "진갈색"];
        
        const spot = ilsanSpots[(finalSeed + 17) % ilsanSpots.length];
        const blessing = spotBlessings[(finalSeed + 13) % spotBlessings.length];
        const rest = rests[(finalSeed + 23) % rests.length];
        const color = colors[(finalSeed + 11) % colors.length];
        const energy = ((finalSeed * 13) % 11) + 90;

        const lotto = [];
        let lSeed = finalSeed;
        while(lotto.length < 7) { 
            let n = Math.floor((Math.abs(Math.sin(lSeed++) * 10000) % 45)) + 1;
            if(!lotto.includes(n)) lotto.push(n);
        }
        lotto.sort((a,b)=>a-b);

        fBox.innerHTML = `
            <div style="text-align:right; font-size:12px; color:#999;">📅 ${dateStr}</div>
            <h3>🔮 ${user.성명}님 오늘의 사업운</h3>
            <p style="font-size:16px; line-height:1.5; color:#d32f2f;"><b>"${mainLuck}"</b></p>
            <p style="font-size:15px; color:var(--primary); font-weight:bold; background:#fff; padding:10px; border-radius:10px; border:1px solid #cce3f6;">
                📍 일산 지역 복채: <br>"${spot}${blessing}"
            </p>
            <hr style="border:0; border-top:1px dashed #ccc; margin:15px 0;">
            <p>⚡ 사업장 에너지: <span class="highlight">${energy}%</span></p>
            <p>🎨 행운 색상: <b>${color}</b></p>
            <p>🍽️ 추천맛집: <b>${rest}</b></p>
            <div style="margin:20px 0; padding:15px; background:#fff; border-radius:15px; border:1px solid #eee; text-align:center;">
                <p style="font-size:14px; margin-bottom:10px; font-weight:bold; color:#666;">🍀 행운 숫자 (로또):</p>
                <div class="lotto-container">${lotto.map(n => `<span class="lotto-ball">${n}</span>`).join('')}</div>
                <p style="font-size:12px; color:#d32f2f; margin-top:10px; font-weight:bold;">" 당첨 시 당첨금의 10%를 혁산회 기금으로 기부해야 합니다 "</p>
            </div>
            <p style="font-size:11px; color:#777; text-align:center; font-style:italic;">" ${user.성명}님의 성명 사주를 기반으로 분석한 결과입니다. "</p>
        `;
    }
</script>
</body>
</html>
